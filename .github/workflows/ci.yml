name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  test:
    name: Node ${{ matrix.node }} — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Node 22+ only — pnpm 11 imports `node:sqlite` which
        # was added in Node 22. The published SDK itself still
        # works on Node 18+ (see `engines.node` in package.json);
        # only the build tooling is gated.
        node: ["22", "24"]

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6.0.8
        # v6 runs on Node 24 (Node 20 in v4 is deprecated by
        # GitHub Actions in June 2026). No `version:` here on
        # purpose — the canonical pin lives in package.json's
        # `packageManager` field, and v6 will reject the workflow
        # if both are set.
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        # `--ignore-scripts` because `msw` ships an optional browser
        # service-worker script we do not use in Node tests; pnpm v11
        # refuses to ignore unapproved build scripts by default.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
