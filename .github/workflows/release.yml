name: Release

# Fires when a `vX.Y.Z` tag is pushed. The job builds the package
# and publishes to npm. Two auth paths are supported:
#
# 1. Bootstrap (first release only): an `NPM_TOKEN` repo secret is
#    used to publish the very first version. npm requires the
#    package to exist before a Trusted Publisher can be registered
#    — there is no pre-registration like PyPI's pending publishers.
# 2. Trusted Publishing (every release after that): once the
#    Trusted Publisher record is configured on
#    https://www.npmjs.com/package/astrolinkers-sdk/access, the
#    `NPM_TOKEN` secret is deleted from the repo and the npm CLI
#    transparently switches to OIDC. The published tarball carries
#    a SLSA build provenance attestation that links it back to
#    this exact tag + commit + workflow.
#
# Trusted Publisher values (configured AFTER first publish):
#   - Package name      : astrolinkers-sdk
#   - GitHub owner      : fedorello
#   - Repository name   : astrolinkers-sdk-ts
#   - Workflow filename : release.yml
#   - Environment name  : npm
#
# pnpm is used for `install` + `build` + tests, but `npm publish`
# does the actual upload because pnpm publish does not yet support
# the OIDC token exchange (pnpm/pnpm#9812).

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build + publish to npm
    runs-on: ubuntu-latest
    # The ``npm`` environment matches the Trusted Publisher record.
    # Protect it in repo settings (e.g. required reviewers) if you
    # want a human in the loop on every release.
    environment:
      name: npm
      url: https://www.npmjs.com/package/astrolinkers-sdk
    permissions:
      # `id-token: write` is the OIDC token npm exchanges for upload
      # creds AND the same token that signs the provenance
      # attestation. `contents: read` is the minimum needed to
      # check the tag out.
      id-token: write
      contents: read

    steps:
      - name: Check out the tag
        uses: actions/checkout@v5

      - name: Install pnpm
        # v6 runs on Node 24 (Node 20 in v4 is deprecated by
        # GitHub Actions in June 2026). The canonical pnpm pin
        # lives in package.json's `packageManager` field — v6
        # rejects the workflow if both are set, so no `version:`
        # here.
        uses: pnpm/action-setup@v6.0.8
        with:
          run_install: false

      - name: Install Node 22
        uses: actions/setup-node@v5
        with:
          # 22.14+ is required for npm Trusted Publishing — earlier
          # 22.x ships an npm CLI older than 11.5.1.
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to >= 11.5.1
        # Trusted Publishing only works with npm 11.5.1+. The
        # version bundled with Node 22 LTS lags behind, so pin to
        # a known-good release explicitly.
        run: npm install --global npm@latest

      - name: Install dependencies
        # `--ignore-scripts` keeps pnpm v11's build-script policy
        # from blocking on optional postinstall scripts (e.g. msw's
        # browser worker, which we do not use).
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify the tag matches package.json version
        # Refuse to publish if the tag does not equal the version
        # declared in package.json — keeps mis-tagged releases
        # from accidentally polluting npm.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Run quality gates
        # Same gates as CI — never publish a build that does not
        # pass lint + format + typecheck + tests.
        run: pnpm run ci

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        # `npm publish` (not pnpm) — pnpm publish does not yet
        # implement the OIDC token exchange (pnpm/pnpm#9812). npm
        # itself transparently picks the right auth path:
        #
        #   - If a Trusted Publisher is configured for this package
        #     and `id-token: write` is granted, npm uses OIDC and
        #     ignores NODE_AUTH_TOKEN.
        #   - Otherwise it falls back to NODE_AUTH_TOKEN.
        #
        # `--provenance` and `--access public` are explicit on
        # purpose: docs claim provenance is implicit under Trusted
        # Publishing but the bootstrap (token-based) publish needs
        # the flag, and `--access public` is required for an
        # unscoped package's first publish.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
